name: Release

on:
  push:
    tags: [v*]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run checks:regex
      - run: bun test

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=\${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # opentoken-core has no workspace:* deps — publish directly
      - name: Publish opentoken-core
        run: npm publish --provenance --access public
        working-directory: packages/core

      - name: Publish opentoken CLI
        run: |
          sed -i 's|"workspace:\*"|"^2.0.0"|g' package.json
          npm publish --provenance --access public
        working-directory: packages/cli

      - name: Publish opentoken-mcp
        run: |
          sed -i 's|"workspace:\*"|"^2.0.0"|g' package.json
          npm publish --provenance --access public
        working-directory: packages/mcp

      - name: Publish @mrgray17/opentoken
        run: |
          sed -i 's|"workspace:\*"|"^2.0.0"|g' package.json
          npm publish --provenance --access public
        working-directory: packages/opencode

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
