name: Release
on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run --filter=@mrgray17/opentoken build
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run checks:regex
      - run: bun test

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          registry-url: "https://registry.npmjs.org"
          node-version: "22"

      # setup-node writes to $NPM_CONFIG_USERCONFIG — append our token there
      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> $NPM_CONFIG_USERCONFIG
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @mrgray17/opentoken-core
        run: npm publish --access public
        working-directory: packages/core

      - name: Publish @mrgray17/opentoken-cli
        run: |
          sed -i 's|"workspace:*"|"^2.1.0"|g' package.json
          npm publish --access public
        working-directory: packages/cli

      - name: Publish @mrgray17/opentoken-mcp
        run: |
          sed -i 's|"workspace:*"|"^2.1.0"|g' package.json
          npm publish --access public
        working-directory: packages/mcp

      - name: Publish @mrgray17/opentoken
        run: |
          sed -i 's|"workspace:*"|"^2.1.0"|g' package.json
          npm publish --access public
        working-directory: packages/opencode

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
